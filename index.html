<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris · Neon</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(ellipse at top, #1a0b3d 0%, #0a0420 50%, #000 100%);
    min-height: 100vh;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow: hidden;
  }
  h1 {
    font-size: 2em;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255,0,255,0.5);
    margin-bottom: 12px;
  }
  .game-wrap {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .board-wrap {
    position: relative;
    border: 2px solid #ff00ff;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(255,0,255,0.4), inset 0 0 20px rgba(0,255,255,0.1);
    background: rgba(0,0,0,0.6);
  }
  canvas#board { display: block; border-radius: 6px; }
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 100px;
  }
  .panel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }
  .panel-label { font-size: 0.7em; opacity: 0.7; letter-spacing: 2px; margin-bottom: 4px; }
  .panel-value {
    font-size: 1.5em; font-weight: 800; color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
  }
  canvas.preview { display:block; margin: 0 auto; }
  .controls {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: 70px 70px;
    gap: 8px;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(0,255,255,0.4);
    border-radius: 12px;
    color: #fff;
    font-size: 1.6em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    display:flex;align-items:center;justify-content:center;
    font-family: inherit;
  }
  .ctrl-btn:active {
    background: rgba(0,255,255,0.3);
    transform: scale(0.95);
    box-shadow: 0 0 15px #00ffff;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    font-size: 1.8em;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #00ffff, #ff00ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .overlay button {
    padding: 12px 24px;
    background: linear-gradient(90deg, #00ffff, #ff00ff);
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-size: 1em;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 0 20px rgba(255,0,255,0.5);
    font-family: inherit;
  }
  .hint { font-size: 0.75em; opacity: 0.6; margin-top: 12px; text-align: center; }
  @media (max-width: 480px) {
    h1 { font-size: 1.5em; }
    .sidebar { min-width: 80px; }
    .panel-value { font-size: 1.2em; }
  }
</style>
</head>
<body>

<h1>TETRIS</h1>

<div class="game-wrap">
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">READY?</h2>
      <div id="overlay-text" style="opacity:0.85;margin-bottom:8px;"></div>
      <button id="overlay-btn">START</button>
    </div>
  </div>
  <div class="sidebar">
    <div class="panel"><div class="panel-label">SCORE</div><div class="panel-value" id="score">0</div></div>
    <div class="panel"><div class="panel-label">💰 COINS</div><div class="panel-value" id="coins" style="color:#ffe259;text-shadow:0 0 10px #ffa751;">0</div></div>
    <div class="panel"><div class="panel-label">LEVEL</div><div class="panel-value" id="level">1</div></div>
    <div class="panel"><div class="panel-label">LINES</div><div class="panel-value" id="lines">0</div></div>
    <div class="panel"><div class="panel-label">NEXT</div><canvas id="next" width="80" height="80"></canvas></div>
  </div>
</div>

<div class="controls">
  <div></div>
  <button class="ctrl-btn" id="btn-rotate">↻</button>
  <button class="ctrl-btn" id="btn-drop" style="background:rgba(255,0,255,0.2);border-color:#ff00ff;font-size:1em;">DROP</button>
  <button class="ctrl-btn" id="btn-left">←</button>
  <button class="ctrl-btn" id="btn-down">↓</button>
  <button class="ctrl-btn" id="btn-right">→</button>
</div>

<div class="hint">键盘:← → ↓ 移动 · ↑ 旋转 · 空格 硬降 · P 暂停 · M 静音</div>
<div style="display:flex;gap:8px;margin-top:10px;">
  <button id="btn-music" style="padding:8px 16px;background:rgba(0,255,255,0.15);border:1px solid #00ffff;color:#fff;border-radius:8px;font-family:inherit;cursor:pointer;font-size:0.9em;">🔊 Music: ON</button>
  <button id="btn-shop" style="padding:8px 16px;background:rgba(255,226,89,0.15);border:1px solid #ffe259;color:#fff;border-radius:8px;font-family:inherit;cursor:pointer;font-size:0.9em;">🛒 商店</button>
</div>

<div id="items-bar" style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;min-height:40px;"></div>

<!-- SHOP MODAL -->
<div id="shop-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;overflow-y:auto;padding:20px;">
  <div style="max-width:600px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <button id="btn-shop-close" style="padding:8px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;font-family:inherit;cursor:pointer;">← 返回</button>
      <h2 style="background:linear-gradient(90deg,#ffe259,#ffa751);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:1.5em;letter-spacing:3px;">🛒 SHOP</h2>
      <div style="font-weight:800;color:#ffe259;font-size:1.1em;">💰 <span id="shop-total">0</span></div>
    </div>
    <div style="opacity:0.7;font-size:0.85em;margin-bottom:12px;text-align:center;">永久装备买一次永远拥有 · 消耗品每局开始自动给</div>
    <div id="shop-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;"></div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20;
const COLORS = {
  I: "#00ffff", O: "#ffff00", T: "#ff00ff",
  S: "#00ff00", Z: "#ff0044", L: "#ff8800", J: "#0088ff"
};
const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  L: [[0,0,1],[1,1,1]],
  J: [[1,0,0],[1,1,1]],
};

const board = document.getElementById("board");
const ctx = board.getContext("2d");
const nextCanvas = document.getElementById("next");
const nextCtx = nextCanvas.getContext("2d");

let CELL = 28;
function sizeBoard() {
  const maxW = Math.min(window.innerWidth - 140, 320);
  const cell = Math.floor(Math.min(maxW / COLS, (window.innerHeight - 280) / ROWS));
  CELL = Math.max(18, cell);
  board.width = CELL * COLS;
  board.height = CELL * ROWS;
}
sizeBoard();
window.addEventListener("resize", () => { sizeBoard(); draw(); });

let grid, current, nextPiece, score, level, lines, gameOver, paused, dropInterval;

function newGrid() { return Array.from({length: ROWS}, () => Array(COLS).fill(null)); }

function randomPiece() {
  const keys = Object.keys(SHAPES);
  const k = keys[Math.floor(Math.random() * keys.length)];
  return {
    type: k,
    shape: SHAPES[k].map(r => r.slice()),
    x: Math.floor((COLS - SHAPES[k][0].length) / 2),
    y: 0,
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const out = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      out[c][rows - 1 - r] = shape[r][c];
  return out;
}

function collides(piece, dx=0, dy=0, shape=null) {
  const s = shape || piece.shape;
  for (let r = 0; r < s.length; r++) {
    for (let c = 0; c < s[r].length; c++) {
      if (!s[r][c]) continue;
      const nx = piece.x + c + dx;
      const ny = piece.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && grid[ny][nx]) return true;
    }
  }
  return false;
}

function merge() {
  current.shape.forEach((row, r) => row.forEach((v, c) => {
    if (v) {
      const ny = current.y + r, nx = current.x + c;
      if (ny >= 0) grid[ny][nx] = current.type;
    }
  }));
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c !== null)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++; r++;
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800][cleared] * level;
    score += points;
    lines += cleared;
    // Coins: 10/line, 50 bonus for tetris
    earnCoins(cleared * 10 + (cleared === 4 ? 50 : 0));
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel > level) {
      level = newLevel;
      earnCoins(30); // level up bonus
    }
    dropInterval = Math.max(80, 800 - (level - 1) * 60);
    updateUI();
  }
}

function spawn() {
  current = nextPiece || randomPiece();
  nextPiece = randomPiece();
  drawNext();
  if (collides(current)) {
    if (owned.shield && !shieldUsed) {
      shieldUsed = true;
      // Clear top 4 rows
      for (let r = 0; r < 4; r++) grid[r] = Array(COLS).fill(null);
      sfx(1200, 0.3, "square", 0.1);
      return;
    }
    endGame();
  }
}

function tick() {
  if (paused || gameOver) return;
  if (!collides(current, 0, 1)) current.y++;
  else { merge(); clearLines(); spawn(); }
  draw();
}

function move(dx) {
  if (paused || gameOver) return;
  if (!collides(current, dx, 0)) { current.x += dx; draw(); }
}
function softDrop() {
  if (paused || gameOver) return;
  if (!collides(current, 0, 1)) { current.y++; score += 1; updateUI(); draw(); }
  else tick();
}
function hardDrop() {
  if (paused || gameOver) return;
  let d = 0;
  while (!collides(current, 0, d + 1)) d++;
  current.y += d;
  score += d * 2;
  merge(); clearLines(); spawn();
  updateUI(); draw();
}
function rotateCurrent() {
  if (paused || gameOver) return;
  const r = rotate(current.shape);
  for (const k of [0, -1, 1, -2, 2]) {
    if (!collides(current, k, 0, r)) {
      current.shape = r; current.x += k; draw(); return;
    }
  }
}

function draw() {
  ctx.fillStyle = "rgba(10,4,32,0.95)";
  ctx.fillRect(0, 0, board.width, board.height);
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, ROWS * CELL); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(COLS * CELL, i * CELL); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) drawCell(ctx, c, r, COLORS[grid[r][c]]);
  if (current && !gameOver) {
    let gd = 0;
    while (!collides(current, 0, gd + 1)) gd++;
    current.shape.forEach((row, r) => row.forEach((v, c) => {
      if (v) {
        const x = current.x + c, y = current.y + r + gd;
        ctx.fillStyle = COLORS[current.type] + "30";
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
      }
    }));
    current.shape.forEach((row, r) => row.forEach((v, c) => {
      if (v) drawCell(ctx, current.x + c, current.y + r, COLORS[current.type]);
    }));
  }
}

function drawCell(c2, x, y, color) {
  if (y < 0) return;
  const px = x * CELL, py = y * CELL;
  c2.fillStyle = color;
  c2.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
  c2.fillStyle = "rgba(255,255,255,0.3)";
  c2.fillRect(px + 1, py + 1, CELL - 2, 3);
  c2.fillStyle = "rgba(0,0,0,0.25)";
  c2.fillRect(px + 1, py + CELL - 4, CELL - 2, 3);
}

function drawNext() {
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const s = nextPiece.shape;
  const cell = 16;
  const ox = (nextCanvas.width - s[0].length * cell) / 2;
  const oy = (nextCanvas.height - s.length * cell) / 2;
  s.forEach((row, r) => row.forEach((v, c) => {
    if (v) {
      nextCtx.fillStyle = COLORS[nextPiece.type];
      nextCtx.fillRect(ox + c * cell + 1, oy + r * cell + 1, cell - 2, cell - 2);
    }
  }));
}

function updateUI() {
  document.getElementById("score").textContent = score;
  document.getElementById("level").textContent = level;
  document.getElementById("lines").textContent = lines;
  document.getElementById("coins").textContent = totalCoins + roundCoins;
}

// =========== COIN SYSTEM ===========
let totalCoins = parseInt(localStorage.getItem("tetris_coins") || "0");
let roundCoins = 0;
let owned = JSON.parse(localStorage.getItem("tetris_owned") || "{}");
let consumables = {}; // per-round consumable counts
function saveData() {
  localStorage.setItem("tetris_coins", totalCoins);
  localStorage.setItem("tetris_owned", JSON.stringify(owned));
}
function earnCoins(n) {
  if (owned.doubleCoin) n *= 2;
  roundCoins += n;
  updateUI();
}

function endGame() {
  gameOver = true;
  // Save earned coins to total
  totalCoins += roundCoins;
  saveData();
  document.getElementById("overlay-title").textContent = "GAME OVER";
  document.getElementById("overlay-text").innerHTML = `Score: ${score} · Lines: ${lines}<br>💰 +${roundCoins} (总:${totalCoins})`;
  document.getElementById("overlay-btn").textContent = "PLAY AGAIN";
  document.getElementById("overlay").classList.remove("hidden");
}

let lastTime = 0;
let accumulator = 0;
function loop(t) {
  if (!lastTime) lastTime = t;
  const dt = t - lastTime;
  lastTime = t;
  if (!paused && !gameOver) {
    accumulator += dt;
    while (accumulator >= dropInterval) { tick(); accumulator -= dropInterval; }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function start() {
  grid = newGrid();
  score = 0; level = 1; lines = 0;
  gameOver = false; paused = false;
  dropInterval = 800; accumulator = 0; lastTime = 0;
  nextPiece = null;
  roundCoins = 0;
  // Refill consumables from owned items
  consumables = {};
  if (owned.bomb) consumables.bomb = 3;
  if (owned.swap) consumables.swap = 3;
  shieldUsed = false;
  spawn();
  updateUI();
  renderItems();
  draw();
  document.getElementById("overlay").classList.add("hidden");
}
let shieldUsed = false;

// Keyboard
document.addEventListener("keydown", e => {
  if (gameOver && e.key !== " ") return;
  if (e.key === "ArrowLeft") { move(-1); e.preventDefault(); }
  else if (e.key === "ArrowRight") { move(1); e.preventDefault(); }
  else if (e.key === "ArrowDown") { softDrop(); e.preventDefault(); }
  else if (e.key === "ArrowUp" || e.key === "x") { rotateCurrent(); e.preventDefault(); }
  else if (e.key === " ") { hardDrop(); e.preventDefault(); }
  else if (e.key === "p" || e.key === "P") { paused = !paused; }
});

// Touch + click bindings (iOS-safe)
function bindBtn(id, fn, repeat=false) {
  const el = document.getElementById(id);
  if (!el) return;
  let interval, touched = false;
  const press = (e) => {
    e.preventDefault();
    fn();
    if (repeat) interval = setInterval(fn, 100);
  };
  const release = () => { if (interval) { clearInterval(interval); interval = null; } };
  el.addEventListener("touchstart", e => { touched = true; press(e); }, {passive:false});
  el.addEventListener("touchend", release);
  el.addEventListener("touchcancel", release);
  el.addEventListener("mousedown", e => { if (touched) return; press(e); });
  el.addEventListener("mouseup", release);
  el.addEventListener("mouseleave", release);
}
bindBtn("btn-left", () => move(-1), true);
bindBtn("btn-right", () => move(1), true);
bindBtn("btn-down", softDrop, true);
bindBtn("btn-rotate", rotateCurrent, false);
bindBtn("btn-drop", hardDrop, false);

// Swipe up = hard drop
let touchStartY = 0;
board.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, {passive:true});
board.addEventListener("touchend", e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy < -50) hardDrop();
});

// Start button — bind both touch and click
const startBtn = document.getElementById("overlay-btn");
function doStart(e) { if (e) e.preventDefault(); initAudio(); startMusic(); start(); }
startBtn.addEventListener("click", doStart);
startBtn.addEventListener("touchend", doStart);

// =========== MUSIC: Korobeiniki Tetris Theme ===========
let audioCtx = null;
let musicEnabled = true;
let musicTimers = [];
let musicPlaying = false;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

const N = {
  E4:329.63, F4:349.23, G4:392, A4:440, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880, B5:987.77,
  GS4:415.30, REST: 0,
  E3:164.81, A3:220, GS3:207.65, D3:146.83, C4:261.63
};

const MELODY = [
  ["E5",2],["B4",1],["C5",1],["D5",2],["C5",1],["B4",1],
  ["A4",2],["A4",1],["C5",1],["E5",2],["D5",1],["C5",1],
  ["B4",3],["C5",1],["D5",2],["E5",2],
  ["C5",2],["A4",2],["A4",2],["REST",2],
  ["D5",3],["F5",1],["A5",2],["G5",1],["F5",1],
  ["E5",3],["C5",1],["E5",2],["D5",1],["C5",1],
  ["B4",2],["B4",1],["C5",1],["D5",2],["E5",2],
  ["C5",2],["A4",2],["A4",2],["REST",2],
];
const BASS = [
  ["E3",4],["A3",4],["GS3",4],["E3",4],
  ["A3",4],["E3",4],["A3",2],["E3",2],["A3",4],
  ["D3",4],["A3",4],["C4",4],["E3",4],
  ["A3",4],["GS3",4],["A3",4],["E3",4],
];

function playNote(freq, t, dur, type, vol) {
  if (!freq) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  osc.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.01);
  gain.gain.linearRampToValueAtTime(vol * 0.7, t + dur * 0.7);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  osc.start(t); osc.stop(t + dur);
}

function startMusic() {
  if (!musicEnabled || !audioCtx || musicPlaying) return;
  musicPlaying = true;
  scheduleLoop();
}

function scheduleLoop() {
  if (!musicEnabled || !audioCtx) { musicPlaying = false; return; }
  const beat = 0.18;
  const start = audioCtx.currentTime + 0.05;
  let mt = start;
  for (const [n, b] of MELODY) {
    const dur = b * beat;
    if (n !== "REST" && N[n]) playNote(N[n], mt, dur * 0.95, "square", 0.07);
    mt += dur;
  }
  let bt = start;
  for (const [n, b] of BASS) {
    const dur = b * beat;
    if (N[n]) playNote(N[n], bt, dur * 0.95, "triangle", 0.06);
    bt += dur;
  }
  const total = mt - start;
  musicTimers.push(setTimeout(scheduleLoop, total * 1000 - 50));
}

function stopMusic() {
  musicTimers.forEach(t => clearTimeout(t));
  musicTimers = [];
  musicPlaying = false;
}

function toggleMusic() {
  initAudio();
  musicEnabled = !musicEnabled;
  const btn = document.getElementById("btn-music");
  if (musicEnabled) {
    btn.textContent = "🔊 Music: ON";
    if (!gameOver && !paused) startMusic();
  } else {
    btn.textContent = "🔇 Music: OFF";
    stopMusic();
  }
}

const musicBtn = document.getElementById("btn-music");
musicBtn.addEventListener("click", toggleMusic);
musicBtn.addEventListener("touchend", e => { e.preventDefault(); toggleMusic(); });

document.addEventListener("keydown", e => {
  if (e.key === "m" || e.key === "M") toggleMusic();
});

// =========== SOUND EFFECTS ===========
function sfx(freq, dur=0.1, type="square", vol=0.08) {
  if (!audioCtx || !musicEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  osc.connect(gain); gain.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur);
}

// Hook sfx into game actions by wrapping originals
const _move = move;
move = function(dx) { const before = current && current.x; _move(dx); if (current && current.x !== before) sfx(330, 0.04, "square", 0.05); };

const _rotate = rotateCurrent;
rotateCurrent = function() { _rotate(); sfx(550, 0.05, "square", 0.06); };

const _hardDrop = hardDrop;
hardDrop = function() {
  _hardDrop();
  // descending sweep
  if (!audioCtx || !musicEnabled) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(60, t + 0.15);
  gain.gain.setValueAtTime(0.1, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.18);
};

const _clearLines = clearLines;
clearLines = function() {
  const before = lines;
  _clearLines();
  if (lines > before) {
    const cleared = lines - before;
    if (cleared === 4) {
      // Tetris! special chord
      [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => sfx(f, 0.15, "square", 0.09), i * 60));
    } else {
      sfx(660, 0.1, "square", 0.07);
      setTimeout(() => sfx(880, 0.12, "square", 0.07), 70);
    }
  }
};

const _endGame = endGame;
endGame = function() {
  _endGame();
  stopMusic();
  if (!audioCtx) return;
  [600, 500, 400, 300, 200].forEach((f, i) => setTimeout(() => sfx(f, 0.2, "sawtooth", 0.1), i * 120));
};

// =========== SHOP & ITEMS ===========
const ITEMS = {
  bomb: { icon: "💣", name: "炸弹", desc: "消除最底下一行 · 每局给 3 个", price: 150, type: "consumable" },
  swap: { icon: "🔄", name: "重抽", desc: "换一个新方块 · 每局给 3 个", price: 100, type: "consumable" },
  shield: { icon: "🛡️", name: "复活甲", desc: "Game Over 时复活一次", price: 500, type: "permanent" },
  doubleCoin: { icon: "⚡", name: "双倍金币", desc: "永久 2× 金币收入", price: 800, type: "permanent" },
  ghost: { icon: "🎯", name: "精准定位", desc: "幽灵方块更明亮", price: 100, type: "permanent" },
};

function renderShop() {
  document.getElementById("shop-total").textContent = totalCoins;
  const grid = document.getElementById("shop-grid");
  grid.innerHTML = "";
  for (const k in ITEMS) {
    const it = ITEMS[k];
    const isOwned = owned[k] && it.type === "permanent";
    const canBuy = totalCoins >= it.price && !isOwned;
    const div = document.createElement("div");
    div.style.cssText = `background:rgba(255,255,255,0.06);border:2px solid ${isOwned ? "#00ff88" : (canBuy ? "rgba(0,255,255,0.3)" : "rgba(255,255,255,0.1)")};border-radius:12px;padding:12px;cursor:${canBuy ? "pointer" : "default"};opacity:${canBuy || isOwned ? 1 : 0.4};display:flex;flex-direction:column;gap:4px;`;
    div.innerHTML = `
      <div style="font-size:2em;text-align:center;">${it.icon}</div>
      <div style="font-weight:800;text-align:center;">${it.name}</div>
      <div style="font-size:0.75em;opacity:0.8;text-align:center;line-height:1.4;min-height:32px;">${it.desc}</div>
      <div style="text-align:center;font-weight:800;color:#ffe259;font-size:0.9em;padding:4px;background:rgba(0,0,0,0.3);border-radius:6px;">
        ${isOwned ? "✅ 已拥有" : "💰 " + it.price}
      </div>`;
    if (canBuy) {
      const buy = (e) => { e && e.preventDefault(); buyItem(k); };
      div.addEventListener("click", buy);
      div.addEventListener("touchend", buy);
    }
    grid.appendChild(div);
  }
}

function buyItem(k) {
  const it = ITEMS[k];
  if (totalCoins < it.price) return;
  if (it.type === "permanent" && owned[k]) return;
  totalCoins -= it.price;
  owned[k] = true;
  saveData();
  sfx(880, 0.15, "square", 0.08);
  setTimeout(() => sfx(1200, 0.15, "square", 0.08), 80);
  renderShop();
  updateUI();
}

const shopModal = document.getElementById("shop-modal");
function openShop(e) { e && e.preventDefault(); renderShop(); shopModal.style.display = "block"; }
function closeShop(e) { e && e.preventDefault(); shopModal.style.display = "none"; }
const shopBtn = document.getElementById("btn-shop");
shopBtn.addEventListener("click", openShop);
shopBtn.addEventListener("touchend", openShop);
const shopClose = document.getElementById("btn-shop-close");
shopClose.addEventListener("click", closeShop);
shopClose.addEventListener("touchend", closeShop);

// Items bar (during gameplay)
function renderItems() {
  const bar = document.getElementById("items-bar");
  bar.innerHTML = "";
  for (const k in consumables) {
    if (consumables[k] <= 0) continue;
    const it = ITEMS[k];
    const slot = document.createElement("button");
    slot.style.cssText = "width:48px;height:48px;background:rgba(255,255,255,0.08);border:2px solid #ffe259;border-radius:10px;color:#fff;font-size:1.4em;cursor:pointer;position:relative;font-family:inherit;";
    slot.innerHTML = `${it.icon}<span style="position:absolute;top:-4px;right:-4px;background:#ff00ff;font-size:0.55em;font-weight:800;border-radius:999px;padding:1px 5px;">${consumables[k]}</span>`;
    const use = (e) => { e && e.preventDefault(); useItem(k); };
    slot.addEventListener("click", use);
    slot.addEventListener("touchend", use);
    bar.appendChild(slot);
  }
}

function useItem(k) {
  if (gameOver || paused) return;
  if (!consumables[k] || consumables[k] <= 0) return;
  if (k === "bomb") {
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r].some(c => c !== null)) {
        grid.splice(r, 1);
        grid.unshift(Array(COLS).fill(null));
        break;
      }
    }
    sfx(80, 0.4, "sawtooth", 0.12);
  } else if (k === "swap") {
    current = randomPiece();
    sfx(440, 0.1, "square", 0.06);
  }
  consumables[k]--;
  renderItems();
  draw();
}

// Update draw to use bright ghost if owned
const _draw = draw;
draw = function() {
  ctx.fillStyle = "rgba(10,4,32,0.95)";
  ctx.fillRect(0, 0, board.width, board.height);
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, ROWS * CELL); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(COLS * CELL, i * CELL); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c]) drawCell(ctx, c, r, COLORS[grid[r][c]]);
  if (current && !gameOver) {
    let gd = 0;
    while (!collides(current, 0, gd + 1)) gd++;
    const ghostAlpha = owned.ghost ? "70" : "30";
    current.shape.forEach((row, r) => row.forEach((v, c) => {
      if (v) {
        const x = current.x + c, y = current.y + r + gd;
        ctx.fillStyle = COLORS[current.type] + ghostAlpha;
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
      }
    }));
    current.shape.forEach((row, r) => row.forEach((v, c) => {
      if (v) drawCell(ctx, current.x + c, current.y + r, COLORS[current.type]);
    }));
  }
};

// Initial state
grid = newGrid();
score = 0; level = 1; lines = 0;
gameOver = true;
draw();
updateUI();
</script>
